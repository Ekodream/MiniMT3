seed: 49
metadata: data/cache/maestro_index.json
val_metadata: data/cache/maestro_val_clips_abs2.json
output_dir: outputs/ckpt_smoke_v3_8_abs2_min_eos
init_from: outputs/ckpt_8gpu_v3_7_abs2_recall/best.pt
split: train
val_split: validation
max_items: 192
val_max_items: 4
train_seconds: 2.0
val_seconds: 2.0
include_ties: true
train_sampling: random
val_sampling: fixed
batch_size: 40
eval_batch_size: 4
num_workers: 2
epochs: 2
max_steps: 2
max_target_tokens: 450
lr: 0.00004
min_lr: 0.000012
weight_decay: 0.015
betas: [0.9, 0.98]
warmup_steps: 1
grad_accum: 1
grad_clip: 1.0
precision: bf16
label_smoothing: 0.04
eos_aux_weight: 1.5
family_weights:
  SHIFT: 1.00
  VELOCITY: 0.75
  PITCH: 1.55
  PEDAL: 1.05
  TIE: 1.05
  EOS: 1.80
auxiliary:
  enabled: true
  onset_weight: 0.15
  frame_weight: 0.04
  onset_pos_weight: 18.0
  frame_pos_weight: 4.0
  onset_width_frames: 1
allow_tf32: true
compile: false
dist_timeout_minutes: 120
prefetch_factor: 2
log_interval: 1
eval_interval: 2
save_interval: 1000
checkpoint_metric: debug_score
debug_score_weights:
  note_f1: 10.0
  offset_f1: 0.75
  eos_hit_rate: 0.0
  natural_eos_rate: 0.10
  forced_eos_rate: 0.50
  loop_rate: 1.0
  pred_ref_penalty: 0.20
  invalid_event_rate: 0.05
early_stop:
  enabled: false
debug_decode:
  enabled: true
  max_items: 2
  max_tokens: 260
  max_time_seconds: 2.25
  min_time_for_eos: 1.70
  constrained: true
  repetition_penalty: 1.18
  loop_window: 12
  loop_repeats: 3
  eos_bias_after_seconds: 2.05
  eos_logit_bias: 0.50
  eos_bias_after_token_ratio: 0.92
  force_eos_on_loop: false
  max_tokens_since_shift: 44
  max_same_time_events: 36
  max_same_time_note_ons: 12
  max_note_on_rate: 24.0
  note_on_budget_floor: 30
  note_on_logit_bias: 0.25
  positive_velocity_logit_bias: 0.20
model_config: configs/model_v3_abs2.yaml
