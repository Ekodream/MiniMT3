seed: 186
nproc_per_node: 8
train_manifest: data/cache/amt_train_8s_mix70hard30_v18.json
val_manifest: data/cache/amt_val_8s_s8_calib512_v13.json
train_split: train
val_split: validation
output_dir: outputs/ckpt_amt_v18_teacher_calibrated
train_cache_dir: data/cache/amt_v18_teacher_calibrated_train_8s_10ms_229mel_center6
val_cache_dir: data/cache/amt_v18_teacher_calibrated_calib512_val_8s_10ms_229mel_center6
init_from: outputs/ckpt_amt_v15_xlarge_duration/best.pt
init_expand: false
teacher_midi_dir: outputs/teacher_bytedance/train_v18_hard4096
max_items:
val_max_items: 512
batch_size: 4
eval_batch_size: 4
num_workers: 4
eval_workers: 2
epochs: 60
max_steps: 600
lr: 0.000010
min_lr: 0.000002
warmup_steps: 250
weight_decay: 0.00012
betas: [0.9, 0.999]
grad_clip: 3.0
precision: bf16
allow_tf32: true
dist_timeout_minutes: 120
prefetch_factor: 3
log_interval: 30
eval_interval: 300
save_interval: 600
debug_items: 32
save_predebug_checkpoint: true
early_stop_min_steps: 1200
early_stop_patience_evals: 5
early_stop_min_delta: 0.0001
bad_clip_f1_threshold: 0.08
decode_preset: v18_f1
freeze_backbone_steps: 300
trainable_patterns_during_freeze:
  - duration_bucket_head
  - duration_head
  - onset_shift_head
  - offset_shift_head
  - onset_condition_fc
  - frame_condition_fc

hard_category_weights:
  base: 1.0
  dense_chords: 1.18
  low_long_pedal: 1.32
  mid_long_notes: 1.28
  weak_notes: 1.20
  very_short_notes: 0.90
  fast_arpeggio: 1.10

selection:
  note_f1_weight: 12.5
  note_recall_weight: 0.60
  note_precision_weight: 0.45
  offset_f1_weight: 1.35
  ratio_log_penalty: 1.05
  over_generation_ratio: 1.18
  under_generation_ratio: 0.82
  f1_min_pred_ref_ratio: 0.78
  f1_max_pred_ref_ratio: 1.20
  over_generation_penalty: 0.90
  under_generation_penalty: 0.45
  bad_clip_penalty: 1.5

selection_sweep:
  enabled: true
  onset_thresholds: [0.44, 0.46, 0.48, 0.50, 0.52]
  frame_thresholds: [0.22, 0.24]
  offset_thresholds: [0.18, 0.20, 0.24]
  frame_diff_modes: [false, true]
  frame_diff_scales: [0.50, 0.65]
  duration_extension_weights: [0.25, 0.35, 0.50]

debug_selection_sweep:
  enabled: true
  onset_thresholds: [0.48, 0.52]
  frame_thresholds: [0.24]
  offset_thresholds: [0.20, 0.24]
  frame_diff_modes: [true]
  frame_diff_scales: [0.50]
  duration_extension_weights: [0.35]

augment:
  enabled: true
  gain_range: [0.94, 1.06]
  noise_std: 0.0025
  freq_masks: 1
  freq_mask_max_bins: 8
  time_masks: 1
  time_mask_max_frames: 28
  time_mask_max_ratio: 0.035
  mask_value: 0.0

inference:
  window_seconds: 8.0
  overlap_seconds: 2.0

audio:
  sample_rate: 16000
  n_mels: 229
  n_fft: 2048
  hop_length: 160
  f_min: 30.0
  f_max: 8000.0

targets:
  frame_strides: [1]
  onset_width_frames: 0
  offset_width_frames: 0
  onset_soft_radius_frames: 2
  offset_soft_radius_frames: 2
  min_note_seconds: 0.02
  include_pedal: true
  include_duration: true
  include_duration_bucket: true
  include_time_shifts: true
  max_duration_seconds: 16.0
  duration_bucket_bounds: [0.125, 0.5, 2.0]
  time_shift_clip_frames: 1.0
  supervision_margin_seconds: 1.0

model:
  architecture: crnn_ensemble
  n_mels: 229
  predict_pedal: true
  predict_duration: true
  predict_duration_bucket: true
  duration_bucket_count: 4
  predict_time_shifts: true
  acoustic_hidden: 1280
  acoustic_rnn_hidden: 448
  acoustic_channels: [80, 112, 160, 224]
  acoustic_context_layers: 1
  acoustic_context_dropout: 0.10
  acoustic_attention_layers: 2
  acoustic_attention_heads: 8
  acoustic_attention_dim_feedforward: 2688

loss:
  onset_weight: 1.34
  frame_weight: 0.58
  offset_weight: 1.28
  velocity_weight: 0.08
  pedal_weight: 0.30
  duration_weight: 0.30
  duration_long_weight: 2.0
  duration_long_target_min: 0.35
  duration_bucket_weight: 0.08
