  offset_pos_weight: 9.0
  pedal_pos_weight: 2.8
  onset_neg_weight: 1.08
  frame_neg_weight: 1.02
  offset_neg_weight: 1.06
  pedal_neg_weight: 1.0
  onset_focal_gamma_pos: 0.0
  onset_focal_gamma_neg: 0.18
  frame_focal_gamma_pos: 0.0
  frame_focal_gamma_neg: 0.10
  offset_focal_gamma_pos: 0.0
  offset_focal_gamma_neg: 0.12

decode:
  onset_threshold: 0.46
  frame_threshold: 0.24
  offset_threshold: 0.20
  min_note_seconds: 0.045
  max_notes_per_second: 30.0
  max_polyphony: 12
  min_onset_gap_seconds: 0.030
  min_frame_at_onset: 0.0
  onset_frame_fusion_weight: 0.0
  disable_chord_recovery: false
  chord_onset_threshold: 0.52
  chord_frame_threshold: 0.24
  chord_window_frames: 2
  chord_score_ratio: 0.88
  onset_peak_prominence: 0.012
  max_notes_per_start_window: 8
  start_window_seconds: 0.055
  use_duration_head: true
  max_duration_seconds: 16.0
  duration_extension_weight: 0.35
  consume_note_energy: true
  energy_neighbor_pitches: 0
  energy_overlap_ratio: 0.55
  infer_onsets_from_frame_diff: true
  frame_diff_n: 2
  frame_diff_scale: 0.50
  frame_diff_min_onset: 0.22
  frame_diff_context_threshold: 0.46
  frame_diff_context_window_frames: 1
  frame_diff_context_min_pitches: 2
  eval_center_only: true
  decode_center_only: true
  reliable_margin_seconds: 1.0
  merge_tolerance_seconds: 0.05
  pedal_threshold: 0.50
  performance_min_note_seconds: 0.055
  performance_min_velocity: 5
  sustain_max_extension: 1.8
  score_quantize_seconds: 0.125
  score_min_note_seconds: 0.125
  score_min_velocity: 8
  score_max_chord_notes: 10
  time_signature: "4/4"
  score_beat_divisions: "2,4"
  score_allow_tuplets: false
