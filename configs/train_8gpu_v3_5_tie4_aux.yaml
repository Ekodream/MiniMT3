seed: 46
metadata: data/cache/maestro_index.json
val_metadata: data/cache/maestro_val_clips_tie4.json
output_dir: outputs/ckpt_8gpu_v3_5_tie4_aux
init_from: outputs/ckpt_8gpu_v3_3_tie4_precision/best.pt
split: train
val_split: validation
max_items:
val_max_items: 50
train_seconds: 4.0
val_seconds: 4.0
include_ties: true
train_sampling: random
val_sampling: fixed
batch_size: 16
eval_batch_size: 4
num_workers: 4
epochs: 500
max_steps: 900
max_target_tokens: 800
lr: 0.00004
min_lr: 0.000012
weight_decay: 0.015
betas: [0.9, 0.98]
warmup_steps: 80
grad_accum: 1
grad_clip: 1.0
precision: bf16
label_smoothing: 0.04
eos_aux_weight: 5.0
family_weights:
  SHIFT: 1.10
  VELOCITY: 0.75
  PITCH: 1.20
  PEDAL: 1.05
  TIE: 1.10
  EOS: 3.75
auxiliary:
  enabled: true
  onset_weight: 0.25
  frame_weight: 0.06
  onset_pos_weight: 18.0
  frame_pos_weight: 4.0
  onset_width_frames: 1
allow_tf32: true
compile: false
prefetch_factor: 2
log_interval: 20
eval_interval: 150
save_interval: 300
checkpoint_metric: debug_score
debug_score_weights:
  note_f1: 6.0
  offset_f1: 0.75
  eos_hit_rate: 0.0
  natural_eos_rate: 0.2
  forced_eos_rate: 1.0
  loop_rate: 1.0
  pred_ref_penalty: 0.35
  invalid_event_rate: 0.05
early_stop:
  enabled: false
debug_decode:
  enabled: true
  max_items: 8
  max_tokens: 500
  max_time_seconds: 4.35
  constrained: true
  repetition_penalty: 1.40
  loop_window: 10
  loop_repeats: 3
  eos_bias_after_seconds: 2.95
  eos_logit_bias: 2.55
  eos_bias_after_token_ratio: 0.68
  force_eos_on_loop: false
  max_tokens_since_shift: 34
  max_same_time_events: 26
  max_same_time_note_ons: 9
  max_note_on_rate: 11.0
  note_on_budget_floor: 17
  note_on_logit_bias: -0.50
  positive_velocity_logit_bias: -0.12
model_config: configs/model_v3_tie4.yaml
