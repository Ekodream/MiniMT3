seed: 42
metadata: data/cache/maestro_index.json
val_metadata: data/cache/maestro_val_clips_rel8.json
output_dir: outputs/ckpt_8gpu_relative
split: train
val_split: validation
max_items:
val_max_items: 50
train_seconds: 8.0
val_seconds: 8.0
train_sampling: random
val_sampling: fixed
batch_size: 4
eval_batch_size: 2
num_workers: 4
epochs: 500
max_steps: 12000
max_target_tokens: 1200
lr: 0.0003
min_lr: 0.000003
weight_decay: 0.01
betas: [0.9, 0.98]
warmup_steps: 1500
grad_accum: 1
grad_clip: 1.0
precision: bf16
label_smoothing: 0.05
eos_aux_weight: 2.0
family_weights:
  SHIFT: 0.9
  VELOCITY: 0.8
  PITCH: 1.35
  PEDAL: 1.2
  EOS: 2.5
allow_tf32: true
compile: false
prefetch_factor: 2
log_interval: 20
eval_interval: 300
save_interval: 1000
debug_decode:
  enabled: true
  max_items: 2
  max_tokens: 900
  max_time_seconds: 8.5
  constrained: true
  repetition_penalty: 1.15
  loop_window: 16
  loop_repeats: 4
model_config: configs/model_relative.yaml
