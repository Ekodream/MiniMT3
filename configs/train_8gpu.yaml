seed: 42
metadata: data/cache/maestro_index.json
val_metadata: data/cache/maestro_val_clips.json
output_dir: outputs/ckpt_8gpu
split: train
val_split: validation
max_items:
val_max_items: 50
train_seconds: 20.0
val_seconds: 20.0
train_sampling: random
val_sampling: fixed
batch_size: 2
eval_batch_size: 2
num_workers: 8
epochs: 40
lr: 0.0003
weight_decay: 0.01
betas: [0.9, 0.98]
warmup_steps: 4000
grad_accum: 2
grad_clip: 1.0
precision: bf16
label_smoothing: 0.05
family_weights:
  SHIFT: 0.9
  VELOCITY: 0.8
  PITCH: 1.35
  PEDAL: 1.2
  EOS: 1.5
allow_tf32: true
compile: false
prefetch_factor: 4
log_interval: 20
eval_interval: 1000
save_interval: 1000
model_config: configs/model.yaml
