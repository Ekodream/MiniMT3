seed: 48
metadata: data/cache/maestro_index.json
val_metadata: data/cache/maestro_val_clips_abs2.json
output_dir: outputs/ckpt_8gpu_v3_7_abs2_recall
init_from: outputs/ckpt_8gpu_v3_6_abs2/best.pt
split: train
val_split: validation
max_items:
val_max_items: 50
train_seconds: 2.0
val_seconds: 2.0
include_ties: true
train_sampling: random
val_sampling: fixed
batch_size: 32
eval_batch_size: 8
num_workers: 4
epochs: 500
max_steps: 900
max_target_tokens: 450
lr: 0.00005
min_lr: 0.000015
weight_decay: 0.015
betas: [0.9, 0.98]
warmup_steps: 80
grad_accum: 1
grad_clip: 1.0
precision: bf16
label_smoothing: 0.04
eos_aux_weight: 4.2
family_weights:
  SHIFT: 0.95
  VELOCITY: 0.75
  PITCH: 1.40
  PEDAL: 1.05
  TIE: 1.05
  EOS: 3.40
auxiliary:
  enabled: true
  onset_weight: 0.15
  frame_weight: 0.04
  onset_pos_weight: 18.0
  frame_pos_weight: 4.0
  onset_width_frames: 1
allow_tf32: true
compile: false
dist_timeout_minutes: 120
prefetch_factor: 2
log_interval: 20
eval_interval: 150
save_interval: 300
checkpoint_metric: debug_score
debug_score_weights:
  note_f1: 10.0
  offset_f1: 0.75
  eos_hit_rate: 0.0
  natural_eos_rate: 0.10
  forced_eos_rate: 1.0
  loop_rate: 1.0
  pred_ref_penalty: 0.30
  invalid_event_rate: 0.05
early_stop:
  enabled: true
  min_steps: 450
  patience: 3
  min_natural_eos_rate: 0.75
  max_loop_rate: 0.25
  min_pred_ref_ratio: 0.30
  max_pred_ref_ratio: 2.00
  min_note_f1: 0.060
debug_decode:
  enabled: true
  max_items: 8
  max_tokens: 340
  max_time_seconds: 2.25
  constrained: true
  repetition_penalty: 1.32
  loop_window: 10
  loop_repeats: 3
  eos_bias_after_seconds: 1.75
  eos_logit_bias: 1.75
  eos_bias_after_token_ratio: 0.78
  force_eos_on_loop: false
  max_tokens_since_shift: 34
  max_same_time_events: 28
  max_same_time_note_ons: 10
  max_note_on_rate: 16.0
  note_on_budget_floor: 18
  note_on_logit_bias: 0.05
  positive_velocity_logit_bias: 0.03
model_config: configs/model_v3_abs2.yaml
