loss:
  onset_weight: 1.30
  frame_weight: 0.58
  offset_weight: 1.00
  velocity_weight: 0.08
  pedal_weight: 0.30
  duration_weight: 0.0
  onset_shift_weight: 0.16
  offset_shift_weight: 0.14
  onset_pos_weight: 9.0
  frame_pos_weight: 2.0
  offset_pos_weight: 8.0
  pedal_pos_weight: 3.0
  onset_neg_weight: 1.12
  frame_neg_weight: 1.00
  offset_neg_weight: 1.06
  pedal_neg_weight: 1.0
  onset_focal_gamma_pos: 0.0
  onset_focal_gamma_neg: 0.6
  frame_focal_gamma_pos: 0.0
  frame_focal_gamma_neg: 0.4
  offset_focal_gamma_pos: 0.0
  offset_focal_gamma_neg: 0.4
decode:
  onset_threshold: 0.30
  frame_threshold: 0.20
  offset_threshold: 0.18
  min_note_seconds: 0.045
  max_notes_per_second: 40.0
  max_polyphony: 12
  min_onset_gap_seconds: 0.03
  onset_peak_prominence: 0.01
  max_notes_per_start_window: 10
  start_window_seconds: 0.06
  use_duration_head: false
