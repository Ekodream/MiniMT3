seed: 173
train_manifest: data/cache/amt_train_4s_uniform192_v8.json
val_manifest: data/cache/amt_val_4s_s8_v8.json
train_split: train
val_split: validation
output_dir: outputs/ckpt_amt_v12_crnn_bytedance_probe_b8
train_cache_dir: data/cache/amt_v12_probe_b8_train_4s_10ms_229mel
val_cache_dir: data/cache/amt_v12_probe_b8_val_4s_10ms_229mel
max_items: 64
val_max_items: 8
batch_size: 8
eval_batch_size: 8
num_workers: 2
eval_workers: 1
epochs: 1
max_steps: 2
lr: 0.00012
min_lr: 0.00001
warmup_steps: 2
weight_decay: 0.0001
betas: [0.9, 0.999]
grad_clip: 3.0
precision: bf16
allow_tf32: true
dist_timeout_minutes: 120
prefetch_factor: 2
log_interval: 1
eval_interval: 2
save_interval: 2
debug_items: 0
early_stop_min_steps: 0
early_stop_patience_evals: 0
audio:
  sample_rate: 16000
  n_mels: 229
  n_fft: 2048
  hop_length: 160
  f_min: 30.0
  f_max: 8000.0
targets:
  frame_strides: [1]
