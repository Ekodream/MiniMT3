seed: 42
metadata: data/cache/maestro_index.json
val_metadata: data/cache/maestro_val_clips_tie4.json
output_dir: outputs/ckpt_8gpu_v3_1_tie4
split: train
val_split: validation
max_items:
val_max_items: 50
train_seconds: 4.0
val_seconds: 4.0
include_ties: true
train_sampling: random
val_sampling: fixed
batch_size: 10
eval_batch_size: 4
num_workers: 4
epochs: 500
max_steps: 12000
max_target_tokens: 800
lr: 0.00025
min_lr: 0.000003
weight_decay: 0.01
betas: [0.9, 0.98]
warmup_steps: 1200
grad_accum: 1
grad_clip: 1.0
precision: bf16
label_smoothing: 0.05
eos_aux_weight: 4.0
family_weights:
  SHIFT: 1.15
  VELOCITY: 0.75
  PITCH: 1.10
  PEDAL: 1.20
  TIE: 1.25
  EOS: 3.50
allow_tf32: true
compile: false
prefetch_factor: 2
log_interval: 20
eval_interval: 300
save_interval: 1000
checkpoint_metric: debug_score
debug_score_weights:
  note_f1: 1.0
  offset_f1: 0.25
  eos_hit_rate: 0.15
  loop_rate: 0.45
  pred_ref_penalty: 0.12
  invalid_event_rate: 0.05
debug_decode:
  enabled: true
  max_items: 8
  max_tokens: 500
  max_time_seconds: 4.5
  constrained: true
  repetition_penalty: 1.25
  loop_window: 10
  loop_repeats: 3
  eos_bias_after_seconds: 3.0
  eos_logit_bias: 3.5
  eos_bias_after_token_ratio: 0.70
  force_eos_on_loop: true
  max_tokens_since_shift: 44
  max_same_time_events: 32
  max_same_time_note_ons: 12
model_config: configs/model_v3_tie4.yaml
