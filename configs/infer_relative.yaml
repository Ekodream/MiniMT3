model_config: configs/model_relative.yaml
sample_rate: 16000
window_seconds: 8.0
overlap_seconds: 1.0
max_tokens: 900
decode:
  mode: fast_greedy
  constrained: true
  beam_size: 4
  repetition_penalty: 1.15
  loop_window: 16
  loop_repeats: 4
  max_time_seconds: 8.5
cleanup:
  pedal_aware: true
  quantize: true
  quantize_step: 0.125
render:
  write_musicxml: true
  write_png: false
  write_pdf: false
  write_svg: false
