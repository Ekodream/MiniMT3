model_config: configs/model.yaml
sample_rate: 16000
window_seconds: 30.0
overlap_seconds: 2.0
max_tokens: 4096
decode:
  mode: constrained_greedy
  beam_size: 4
cleanup:
  pedal_aware: true
  quantize: true
  quantize_step: 0.125
render:
  write_musicxml: true
  write_png: true
  write_pdf: true
  write_svg: true
