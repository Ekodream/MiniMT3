model_config: configs/model.yaml
sample_rate: 16000
window_seconds: 20.0
overlap_seconds: 0.0
max_tokens: 300
decode:
  mode: fast_greedy
  constrained: true
  beam_size: 4
  repetition_penalty: 1.15
  loop_window: 16
  loop_repeats: 4
cleanup:
  pedal_aware: true
  quantize: true
  quantize_step: 0.125
render:
  write_musicxml: true
  write_png: false
  write_pdf: false
  write_svg: false
