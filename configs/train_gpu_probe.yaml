seed: 42
metadata: data/cache/maestro_index.json
val_metadata: data/cache/maestro_debug_clips.json
output_dir: outputs/gpu_probe
split: train
val_split: validation
max_items: 2
val_max_items: 2
train_seconds: 20.0
val_seconds: 20.0
train_sampling: random
val_sampling: fixed
batch_size: 2
eval_batch_size: 2
num_workers: 0
