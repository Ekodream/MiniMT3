seed: 42
metadata: data/cache/maestro_index.json
val_metadata: data/cache/maestro_debug_clips_tie4.json
output_dir: outputs/ckpt_tiny_v3_tie4
split: train
val_split: validation
max_items: 4
val_max_items: 2
train_seconds: 4.0
val_seconds: 4.0
include_ties: true
train_sampling: random
val_sampling: fixed
batch_size: 2
eval_batch_size: 2
num_workers: 2
epochs: 200
max_steps: 800
max_target_tokens: 800
lr: 0.0003
min_lr: 0.000003
weight_decay: 0.01
betas: [0.9, 0.98]
warmup_steps: 100
grad_accum: 1
grad_clip: 1.0
precision: bf16
label_smoothing: 0.02
eos_aux_weight: 3.0
family_weights:
  SHIFT: 0.85
  VELOCITY: 0.75
  PITCH: 1.4
  PEDAL: 1.2
  TIE: 1.25
  EOS: 3.0
allow_tf32: true
compile: false
prefetch_factor: 2
log_interval: 10
eval_interval: 100
save_interval: 400
checkpoint_metric: debug_score
debug_decode:
  enabled: true
  max_items: 2
  max_tokens: 600
  max_time_seconds: 4.5
  constrained: true
  repetition_penalty: 1.2
  loop_window: 10
  loop_repeats: 3
  eos_bias_after_seconds: 3.5
  eos_logit_bias: 2.5
  eos_bias_after_token_ratio: 0.75
  force_eos_on_loop: true
  max_tokens_since_shift: 64
  max_same_time_events: 48
  max_same_time_note_ons: 16
model_config: configs/model_v3_tie4.yaml
